<div class="min-h-screen bg-gray-100">
  <nav class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <h1 class="text-xl font-bold text-gray-900">TechNotes</h1>
        </div>
        <div class="flex items-center space-x-4">
          <button (click)="createNote()" class="bg-indigo-600 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-indigo-700">Add Note</button>
          <button (click)="logout()" class="text-gray-600 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
    <div class="px-4 py-6 sm:px-0">
      <div *ngIf="notes.length === 0" class="text-center py-10">
        <p class="text-gray-500">No notes found. Create your first note!</p>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div *ngFor="let note of notes" class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow duration-200">
          <div class="p-6">
            <div class="flex justify-between items-start">
              <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                {{note.category || 'General'}}
              </span>
            </div>
            <h3 class="mt-4 text-lg font-medium text-gray-900">{{note.title}}</h3>
            <p class="mt-2 text-sm text-gray-500 line-clamp-3">{{note.content}}</p>
          </div>
          <div class="bg-gray-50 px-6 py-3 flex justify-end space-x-3 border-t border-gray-200">
            <button (click)="editNote(note)" class="text-indigo-600 hover:text-indigo-900 text-sm font-medium">Edit</button>
            <button (click)="deleteNote(note._id)" class="text-red-600 hover:text-red-900 text-sm font-medium">Delete</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
