<div class="min-h-screen bg-gray-100 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-3xl mx-auto bg-white p-8 rounded-lg shadow-md">
    <div class="md:flex md:items-center md:justify-between mb-8">
      <div class="flex-1 min-w-0">
        <h2 class="text-2xl font-bold leading-7 text-gray-900 sm:text-3xl sm:truncate">
          {{ isEditMode ? 'Edit Note' : 'Create New Note' }}
        </h2>
      </div>
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div *ngIf="error" class="bg-red-50 p-4 rounded-md">
        <p class="text-sm text-red-700">{{error}}</p>
      </div>

      <div>
        <label for="title" class="block text-sm font-medium text-gray-700">Title</label>
        <div class="mt-1">
          <input type="text" name="title" id="title" required [(ngModel)]="note.title" class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border-gray-300 rounded-md py-2 px-3 border" placeholder="Note Title">
        </div>
      </div>

      <div>
        <label for="category" class="block text-sm font-medium text-gray-700">Category</label>
        <div class="mt-1">
          <input type="text" name="category" id="category" [(ngModel)]="note.category" class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border-gray-300 rounded-md py-2 px-3 border" placeholder="e.g. Work, Personal, Study">
        </div>
      </div>

      <div>
        <label for="content" class="block text-sm font-medium text-gray-700">Content</label>
        <div class="mt-1">
          <textarea id="content" name="content" rows="6" required [(ngModel)]="note.content" class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border border-gray-300 rounded-md py-2 px-3" placeholder="Write your note down here..."></textarea>
        </div>
      </div>

      <div class="flex justify-end gap-3">
        <button type="button" (click)="cancel()" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
          Cancel
        </button>
        <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
          {{ isEditMode ? 'Save Changes' : 'Create Note' }}
        </button>
      </div>
    </form>
  </div>
</div>
